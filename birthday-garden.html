  /* Floating petals */
  .petals-container {
    position: fixed; top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none; z-index: 0; overflow: hidden;
  }
  .petal {
    position: absolute; width: 14px; height: 14px;
    border-radius: 50% 10% 50% 10%;
    opacity: 0.2;
    animation: petalFall linear infinite;
  }
  @keyframes petalFall {
    0% { transform: translateY(-10vh) rotate(0deg) translateX(0); opacity: 0; }
    8% { opacity: 0.2; }
    92% { opacity: 0.2; }
    100% { transform: translateY(110vh) rotate(720deg) translateX(120px); opacity: 0; }
  }

  .container {
    position: relative; z-index: 1;
    max-width: 560px;
    margin: 0 auto;
    padding: 32px 14px 60px;
    min-height: 100vh;
  }

  /* Header */
  .header {
    text-align: center;
    margin-bottom: 24px;
  }
  .header h1 {
    font-family: 'Ma Shan Zheng', cursive;
    font-size: 2.4em;
    color: var(--text-light);
    letter-spacing: 6px;
    margin-bottom: 6px;
    text-shadow: 0 2px 12px rgba(0,0,0,0.4);
  }
  .header .subtitle {
    font-size: 0.9em;
    color: var(--text-medium);
    font-weight: 300;
    line-height: 1.8;
    text-shadow: 0 1px 6px rgba(0,0,0,0.3);
  }
  .header .divider {
    width: 80px; height: 1.5px;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.5), transparent);
    margin: 12px auto;
  }

  /* Status bar */
  .status-bar {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 16px;
    margin-bottom: 20px;
    flex-wrap: wrap;
  }
  .chances-display {
    background: var(--glass-bg);
    border: 1.5px solid var(--glass-border);
    border-radius: 30px;
    padding: 8px 20px;
    font-size: 0.95em;
    color: var(--text-light);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    box-shadow: 0 2px 12px rgba(0,0,0,0.15);
    transition: all 0.3s;
    text-shadow: 0 1px 4px rgba(0,0,0,0.3);
  }
  .chances-display .num {
    font-weight: 600; font-size: 1.35em;
    color: #ffd5e0; margin: 0 3px;
    text-shadow: 0 0 10px rgba(255,180,200,0.5);
  }
  .chances-display.low { border-color: rgba(255,180,180,0.6); }
  .chances-display.low .num { color: #ff9090; }
  .progress-text {
    font-size: 0.88em;
    color: var(--text-medium);
    text-shadow: 0 1px 4px rgba(0,0,0,0.3);
  }

  /* 8x8 Grid - vertical friendly */
  .word-grid {
    display: grid;
    grid-template-columns: repeat(8, 1fr);
    gap: 5px;
    margin-bottom: 24px;
  }
  @media (max-width: 520px) {
    .word-grid { grid-template-columns: repeat(4, 1fr); gap: 5px; }
    .header h1 { font-size: 1.9em; }
    .container { padding: 24px 12px 50px; }
  }

  /* Tile */
  .tile {
    aspect-ratio: 1;
    border: 1px solid transparent;
    border-radius: 9px;
    font-family: 'Noto Serif SC', serif;
    font-size: 0.78em;
    font-weight: 500;
    cursor: pointer;
    position: relative;
    overflow: hidden;
    transition: transform 0.25s, box-shadow 0.25s, background 0.5s, color 0.5s, border-color 0.3s;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 2px;
    line-height: 1.1;
    word-break: break-all;
  }

  /* Unrevealed - glassmorphism */
  .tile.unrevealed {
    background: var(--tile-unrevealed);
    color: rgba(255,255,255,0.6);
    border-color: rgba(255,255,255,0.12);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    box-shadow: 0 1px 6px rgba(0,0,0,0.1);
  }
  .tile.unrevealed:hover {
    background: var(--tile-unrevealed-hover);
    transform: translateY(-2px);
    box-shadow: 0 4px 14px rgba(0,0,0,0.2);
    border-color: rgba(255,255,255,0.3);
    color: rgba(255,255,255,0.85);
  }
  .tile.unrevealed:active { transform: translateY(0); }

  /* Correct - bloomed */
  .tile.correct {
    color: white;
    font-weight: 600;
    text-shadow: 0 1px 4px rgba(0,0,0,0.3);
    cursor: default;
    border-color: rgba(255,255,255,0.4);
    box-shadow: 0 3px 14px rgba(0,0,0,0.2), 0 0 20px rgba(255,255,255,0.1);
    animation: bloom 0.7s cubic-bezier(0.34, 1.56, 0.64, 1) both;
  }
  @keyframes bloom {
    0% { transform: scale(0.85); opacity: 0.5; }
    50% { transform: scale(1.08); box-shadow: 0 0 30px rgba(255,255,255,0.3); }
    100% { transform: scale(1); opacity: 1; }
  }

  /* Wrong - withered */
  .tile.wrong {
    background: var(--tile-wrong);
    color: rgba(200,195,190,0.5);
    cursor: default;
    text-decoration: line-through;
    text-decoration-color: rgba(200,195,190,0.3);
    border-color: rgba(80,75,70,0.2);
    backdrop-filter: blur(4px);
    -webkit-backdrop-filter: blur(4px);
    animation: wither 0.5s ease both;
  }
  @keyframes wither {
    0% { transform: scale(1); opacity: 1; }
    50% { transform: scale(0.92); opacity: 0.7; }
    100% { transform: scale(1); opacity: 0.5; }
  }

  /* Tile bloom colors */
  .tile.c0 { background: linear-gradient(135deg, rgba(126,184,218,0.9), rgba(90,156,202,0.9)); }
  .tile.c1 { background: linear-gradient(135deg, rgba(201,177,208,0.9), rgba(184,156,196,0.9)); }
  .tile.c2 { background: linear-gradient(135deg, rgba(232,160,191,0.9), rgba(216,144,168,0.9)); }
  .tile.c3 { background: linear-gradient(135deg, rgba(168,197,160,0.9), rgba(143,184,136,0.9)); }
  .tile.c4 { background: linear-gradient(135deg, rgba(232,200,122,0.9), rgba(212,168,83,0.9)); }
  .tile.c5 { background: linear-gradient(135deg, rgba(155,127,184,0.9), rgba(133,105,163,0.9)); }
  .tile.c6 { background: linear-gradient(135deg, rgba(106,140,201,0.9), rgba(87,120,181,0.9)); }
  .tile.c7 { background: linear-gradient(135deg, rgba(232,160,128,0.9), rgba(216,136,104,0.9)); }
  .tile.c8 { background: linear-gradient(135deg, rgba(240,182,200,0.9), rgba(224,160,184,0.9)); }
  .tile.c9 { background: linear-gradient(135deg, rgba(245,200,160,0.9), rgba(224,176,144,0.9)); }
  .tile.c10 { background: linear-gradient(135deg, rgba(232,184,80,0.9), rgba(212,160,48,0.9)); }
  .tile.c11 { background: linear-gradient(135deg, rgba(216,128,176,0.9), rgba(192,104,152,0.9)); }
  .tile.c12 { background: linear-gradient(135deg, rgba(232,112,128,0.9), rgba(208,88,104,0.9)); }
  .tile.c13 { background: linear-gradient(135deg, rgba(136,197,136,0.9), rgba(106,176,106,0.9)); }
  .tile.c14 { background: linear-gradient(135deg, rgba(138,184,224,0.9), rgba(106,160,208,0.9)); }
  .tile.c15 { background: linear-gradient(135deg, rgba(184,200,160,0.9), rgba(160,184,136,0.9)); }

  /* Feedback toast */
  .feedback-toast {
    position: fixed; top: 45%; left: 50%;
    transform: translate(-50%, -50%) scale(0.8);
    background: rgba(255,255,255,0.92);
    padding: 14px 28px;
    border-radius: 16px;
    font-size: 1em;
    box-shadow: 0 6px 30px rgba(0,0,0,0.2);
    z-index: 90;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s, transform 0.3s;
    white-space: nowrap;
    backdrop-filter: blur(10px);
  }
  .feedback-toast.show {
    opacity: 1;
    transform: translate(-50%, -50%) scale(1);
  }
  .feedback-toast.correct { color: var(--sage-deep); border: 2px solid var(--sage); }
  .feedback-toast.wrong { color: var(--rose-deep); border: 2px solid var(--rose); }

  /* Wish modal */
  .wish-overlay {
    display: none;
    position: fixed; top: 0; left: 0;
    width: 100%; height: 100%;
    background: rgba(0,0,0,0.35);
    z-index: 100;
    align-items: center;
    justify-content: center;
    backdrop-filter: blur(6px);
  }
  .wish-overlay.active { display: flex; }
  .wish-modal {
    background: rgba(255,255,255,0.95);
    border-radius: 24px;
    padding: 34px 28px;
    max-width: 400px;
    width: 85%;
    box-shadow: 0 8px 40px rgba(0,0,0,0.2);
    text-align: center;
    animation: modalIn 0.5s ease;
    backdrop-filter: blur(20px);
  }
  @keyframes modalIn {
    from { transform: scale(0.9) translateY(20px); opacity: 0; }
    to { transform: scale(1) translateY(0); opacity: 1; }
  }
  .wish-modal .wish-flower {
    font-size: 2.4em;
    margin-bottom: 4px;
  }
  .wish-modal .wish-word {
    font-family: 'Ma Shan Zheng', cursive;
    font-size: 1.7em;
    margin-bottom: 6px;
    background: linear-gradient(135deg, var(--sage-deep), var(--rose-deep));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .wish-modal .wish-hint {
    color: #7a7a6a;
    font-size: 0.9em;
    margin-bottom: 18px;
    line-height: 1.6;
  }
  .wish-textarea {
    width: 100%;
    padding: 12px 16px;
    border: 1.5px solid var(--sage);
    border-radius: 12px;
    font-size: 0.95em;
    font-family: 'Noto Serif SC', serif;
    resize: vertical;
    min-height: 72px;
    background: #f8f5e8;
    color: #4a4a3a;
    outline: none;
    transition: border-color 0.3s;
  }
  .wish-textarea:focus { border-color: var(--rose); }
  .wish-submit {
    margin-top: 14px;
    padding: 10px 32px;
    background: linear-gradient(135deg, var(--rose), var(--rose-deep));
    color: white; border: none;
    border-radius: 30px;
    font-size: 0.95em;
    font-family: 'Noto Serif SC', serif;
    cursor: pointer;
    transition: all 0.3s;
  }
  .wish-submit:hover {
    transform: translateY(-1px);
    box-shadow: 0 4px 12px rgba(232,160,191,0.4);
  }

  /* Celebration */
  .celebration {
    display: none;
    text-align: center;
    padding: 16px 0;
    animation: celebIn 0.8s ease;
  }
  .celebration.active { display: block; }
  @keyframes celebIn {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .celebration h2 {
    font-family: 'Ma Shan Zheng', cursive;
    font-size: 1.9em;
    color: var(--text-light);
    margin-bottom: 6px;
    text-shadow: 0 2px 12px rgba(0,0,0,0.4);
  }
  .celeb-sub {
    color: var(--text-medium);
    margin-bottom: 24px;
    font-size: 0.95em;
    text-shadow: 0 1px 6px rgba(0,0,0,0.3);
  }
  .wish-results {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 12px;
    text-align: left;
  }
  .wish-result-card {
    background: var(--glass-strong);
    border-radius: 14px;
    padding: 16px;
    border-left: 3px solid var(--sage);
    animation: cardSlide 0.5s ease both;
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    box-shadow: 0 3px 12px rgba(0,0,0,0.15);
  }
  .wish-result-card:nth-child(even) { border-left-color: var(--rose); }
  @keyframes cardSlide {
    from { opacity: 0; transform: translateX(-15px); }
    to { opacity: 1; transform: translateX(0); }
  }
  .result-word {
    font-family: 'Ma Shan Zheng', cursive;
    font-size: 1.25em;
    color: var(--text-light);
    margin-bottom: 6px;
    text-shadow: 0 1px 6px rgba(0,0,0,0.3);
  }
  .result-wish {
    color: var(--text-medium);
    font-size: 0.9em;
    line-height: 1.7;
    font-style: italic;
  }
  .result-wish.empty { color: var(--text-faint); font-style: normal; }

  .wrong-summary {
    margin-top: 16px;
    background: var(--glass-bg);
    border-radius: 14px;
    padding: 16px;
    text-align: left;
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
  }
  .wrong-summary .result-word { color: #f5d5a0; }
  .wrong-tags { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 8px; }
  .wrong-tag {
    background: rgba(255,255,255,0.15);
    color: var(--text-medium);
    padding: 4px 10px;
    border-radius: 14px;
    font-size: 0.82em;
    border: 1px solid rgba(255,255,255,0.1);
  }

  .export-btn {
    margin-top: 24px;
    padding: 12px 30px;
    background: var(--glass-strong);
    color: var(--text-light);
    border: 1.5px solid var(--glass-border);
    border-radius: 30px;
    font-size: 0.95em;
    font-family: 'Noto Serif SC', serif;
    cursor: pointer;
    transition: all 0.3s;
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    text-shadow: 0 1px 4px rgba(0,0,0,0.3);
  }
  .export-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 18px rgba(0,0,0,0.2);
    background: rgba(255,255,255,0.35);
  }

  .restart-btn {
    margin-top: 12px;
    padding: 10px 28px;
    background: transparent;
    color: var(--text-light);
    border: 1.5px solid var(--glass-border);
    border-radius: 30px;
    font-size: 0.9em;
    font-family: 'Noto Serif SC', serif;
    cursor: pointer;
    transition: all 0.3s;
    backdrop-filter: blur(8px);
    text-shadow: 0 1px 4px rgba(0,0,0,0.3);
  }
  .restart-btn:hover {
    background: rgba(255,255,255,0.15);
    border-color: rgba(255,255,255,0.5);
    transform: translateY(-1px);
  }

  .reset-link {
    display: inline-block;
    margin-top: 6px;
    color: var(--text-faint);
    font-size: 0.82em;
    cursor: pointer;
    text-decoration: underline;
    text-decoration-color: rgba(255,255,255,0.2);
    transition: color 0.3s;
  }
  .reset-link:hover { color: var(--text-medium); }

  /* Confetti */
  .confetti-piece {
    position: fixed;
    width: 8px; height: 8px;
    border-radius: 2px;
    z-index: 200; pointer-events: none;
    animation: confettiFall 2s ease-out forwards;
  }
  @keyframes confettiFall {
    0% { opacity: 1; transform: translateY(0) rotate(0deg); }
    100% { opacity: 0; transform: translateY(100vh) rotate(720deg); }
  }

  .game-over-msg {
    text-align: center;
    padding: 14px;
    color: var(--text-medium);
    font-size: 0.95em;
    line-height: 1.8;
    text-shadow: 0 1px 6px rgba(0,0,0,0.3);
  }

  .footer {
    text-align: center;
    padding: 16px 0 8px;
    color: var(--text-faint);
    font-size: 0.78em;
    text-shadow: 0 1px 4px rgba(0,0,0,0.3);
  }
  .footer .heart { color: var(--rose); }
</style>
</head>
<body>

<div class="petals-container" id="petalsContainer"></div>
<div class="feedback-toast" id="feedbackToast"></div>

<div class="wish-overlay" id="wishOverlay">
  <div class="wish-modal">
    <div class="wish-flower" id="wishFlower">🌸</div>
    <div class="wish-word" id="wishWord"></div>
    <div class="wish-hint">猜对啦！这个愿望开花了～<br>请围绕它写一句生日祝福送给我吧</div>
    <textarea class="wish-textarea" id="wishTextarea" placeholder="写下你的祝福..."></textarea>
    <br>
    <button class="wish-submit" onclick="submitWish()">送出祝福 💌</button>
  </div>
</div>

<div class="container">
  <div class="header">
    <h1>愿望花田</h1>
    <div class="divider"></div>
    <div class="subtitle">
      这片花田里藏着我新一岁的 16 个愿望<br>
      点点看，哪些词语会开花 🌼
    </div>
  </div>

  <div class="status-bar">
    <div class="chances-display" id="chancesDisplay">
      剩余机会：<span class="num" id="chancesNum">10</span> 次
    </div>
    <div class="progress-text" id="progressText">已开花 0 / 16</div>
  </div>

  <div class="word-grid" id="wordGrid"></div>

  <div class="celebration" id="celebration">
    <h2>🌷 花田开满了！</h2>
    <div class="celeb-sub">谢谢你陪我一起让这些愿望开花 🌸</div>
    <div class="wish-results" id="wishResults"></div>
    <button class="export-btn" onclick="exportResults()">📋 复制祝福汇总</button>
    <button class="restart-btn" onclick="resetGame()">🔄 重新开始</button>
  </div>

  <div class="footer">
    made with <span class="heart">♥</span> for my birthday
    <br><span class="reset-link" onclick="resetGame()">重置花田</span>
  </div>
</div>

<script>
const WISH_WORDS = [
  { word: 'offer', color: 0, flower: '🌸' },
  { word: '论文', color: 1, flower: '💜' },
  { word: '考公', color: 2, flower: '🌺' },
  { word: '副业', color: 3, flower: '🍀' },
  { word: '自媒体', color: 4, flower: '🌻' },
  { word: '生涯规划师', color: 5, flower: '🌷' },
  { word: '塔罗咨询师', color: 6, flower: '🔮' },
  { word: '网店', color: 7, flower: '🧡' },
  { word: '身材', color: 8, flower: '🌹' },
  { word: '皮肤', color: 9, flower: '🍑' },
  { word: '黄金', color: 10, flower: '✨' },
  { word: '舞蹈', color: 11, flower: '💃' },
  { word: '恋爱', color: 12, flower: '❤️' },
  { word: '健康', color: 13, flower: '🌿' },
  { word: '平安', color: 14, flower: '💧' },
  { word: '松弛', color: 15, flower: '🍃' }
];

const DECOY_WORDS = [
  '考研','留学','创业','投资','股票','基金','买房','驾照','实习','跳槽',
  '旅行','摄影','烘焙','读书','插花','书法','茶道','陶艺','刺绣','手工',
  '瑜伽','游泳','网球','骑行','攀岩','冥想','跑步','滑板','拳击','画画',
  '吉他','钢琴','写作','诗歌','漫画','养猫','养狗','民宿','露营','桌游',
  '咖啡','美食','穿搭','化妆','美甲','汉服','播客','极简'
];

const TOTAL_WISHES = WISH_WORDS.length;
const INITIAL_CHANCES = 10;
const BONUS_CHANCES = 2;

let state = {
  chances: INITIAL_CHANCES,
  clicked: {},
  wishes: {},
  gameOver: false,
  layout: null
};

function init() {
  loadState();
  createPetals();
  buildGrid();
  updateUI();
}

function loadState() {
  try {
    const saved = localStorage.getItem('wishGarden');
    if (saved) {
      const parsed = JSON.parse(saved);
      state.chances = parsed.chances ?? INITIAL_CHANCES;
      state.clicked = parsed.clicked || {};
      state.wishes = parsed.wishes || {};
      state.gameOver = parsed.gameOver || false;
      state.layout = parsed.layout || null;
    }
  } catch(e) {}
  if (!state.layout) {
    state.layout = shuffleWords();
    saveState();
  }
}

function saveState() {
  localStorage.setItem('wishGarden', JSON.stringify({
    chances: state.chances,
    clicked: state.clicked,
    wishes: state.wishes,
    gameOver: state.gameOver,
    layout: state.layout
  }));
}

function shuffleWords() {
  const all = [
    ...WISH_WORDS.map((w, i) => ({ word: w.word, isWish: true, colorIndex: i })),
    ...DECOY_WORDS.map(w => ({ word: w, isWish: false, colorIndex: -1 }))
  ];
  for (let i = all.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [all[i], all[j]] = [all[j], all[i]];
  }
  return all;
}

function createPetals() {
  const container = document.getElementById('petalsContainer');
  const colors = ['#f5d5e5', '#e8f0e0', '#f0e8d0', '#d8e8f0', '#f0d8e8', '#e8e0f0'];
  for (let i = 0; i < 15; i++) {
    const petal = document.createElement('div');
    petal.className = 'petal';
    petal.style.left = Math.random() * 100 + '%';
    petal.style.animationDuration = (10 + Math.random() * 14) + 's';
    petal.style.animationDelay = (Math.random() * 12) + 's';
    petal.style.background = colors[Math.floor(Math.random() * colors.length)];
    const size = 8 + Math.random() * 10;
    petal.style.width = size + 'px';
    petal.style.height = size + 'px';
    container.appendChild(petal);
  }
}

function buildGrid() {
  const grid = document.getElementById('wordGrid');
  grid.innerHTML = '';
  state.layout.forEach((item, index) => {
    const tile = document.createElement('button');
    tile.className = 'tile';
    tile.textContent = item.word;
    tile.dataset.index = index;
    if (state.clicked[index] === 'correct') {
      tile.classList.add('correct', 'c' + item.colorIndex);
    } else if (state.clicked[index] === 'wrong') {
      tile.classList.add('wrong');
    } else {
      tile.classList.add('unrevealed');
    }
    if (state.clicked[index] || state.gameOver) tile.disabled = true;
    tile.addEventListener('click', () => handleTileClick(index, tile));
    grid.appendChild(tile);
  });
}

function handleTileClick(index, tile) {
  if (state.gameOver || state.clicked[index]) return;
  const item = state.layout[index];
  if (item.isWish) {
    state.clicked[index] = 'correct';
    state.chances += BONUS_CHANCES;
    tile.classList.remove('unrevealed');
    tile.classList.add('correct', 'c' + item.colorIndex);
    tile.disabled = true;
    showToast('🎉 开花啦！「' + item.word + '」+2 次机会！', 'correct');
    burstConfetti();
    saveState();
    setTimeout(() => showWishModal(item.word, WISH_WORDS[item.colorIndex].flower), 700);
  } else {
    state.clicked[index] = 'wrong';
    state.chances--;
    tile.classList.remove('unrevealed');
    tile.classList.add('wrong');
    tile.disabled = true;
    showToast('🍂 没开花...「' + item.word + '」机会 -1', 'wrong');
    saveState();
  }
  updateUI();
}

let toastTimer = null;
function showToast(text, type) {
  const toast = document.getElementById('feedbackToast');
  toast.textContent = text;
  toast.className = 'feedback-toast ' + type;
  void toast.offsetWidth;
  toast.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => toast.classList.remove('show'), 2200);
}

let currentWishWord = null;
function showWishModal(word, flower) {
  currentWishWord = word;
  document.getElementById('wishFlower').textContent = flower;
  document.getElementById('wishWord').textContent = word;
  document.getElementById('wishTextarea').value = state.wishes[word] || '';
  document.getElementById('wishOverlay').classList.add('active');
  setTimeout(() => document.getElementById('wishTextarea').focus(), 300);
}

function submitWish() {
  if (currentWishWord) {
    const wish = document.getElementById('wishTextarea').value.trim();
    state.wishes[currentWishWord] = wish;
    saveState();
  }
  document.getElementById('wishOverlay').classList.remove('active');
  currentWishWord = null;
  updateUI();
}

function burstConfetti() {
  const colors = ['#e8a0bf', '#a8c5a0', '#f5d5a0', '#c9b1d0', '#a8d8ea', '#d4a853', '#e87080'];
  for (let i = 0; i < 36; i++) {
    const piece = document.createElement('div');
    piece.className = 'confetti-piece';
    piece.style.left = (25 + Math.random() * 50) + '%';
    piece.style.top = (15 + Math.random() * 25) + '%';
    piece.style.background = colors[Math.floor(Math.random() * colors.length)];
    piece.style.animationDelay = (Math.random() * 0.6) + 's';
    piece.style.animationDuration = (1.5 + Math.random() * 1.2) + 's';
    document.body.appendChild(piece);
    setTimeout(() => piece.remove(), 3500);
  }
}

function updateUI() {
  const numEl = document.getElementById('chancesNum');
  const displayEl = document.getElementById('chancesDisplay');
  numEl.textContent = state.chances;
  displayEl.className = 'chances-display' + (state.chances <= 3 ? ' low' : '');
  const correctCount = Object.values(state.clicked).filter(v => v === 'correct').length;
  document.getElementById('progressText').textContent = '已开花 ' + correctCount + ' / ' + TOTAL_WISHES;
  if (state.chances <= 0 && correctCount < TOTAL_WISHES) {
    state.gameOver = true; saveState();
    disableRemainingTiles();
    showGameOverMessage(correctCount);
  }
  if (correctCount === TOTAL_WISHES) {
    state.gameOver = true; saveState();
    setTimeout(() => showCelebration(), 500);
  }
}

function disableRemainingTiles() {
  document.querySelectorAll('.tile.unrevealed').forEach(t => {
    t.disabled = true;
    t.style.opacity = '0.3';
  });
}

function showGameOverMessage(correctCount) {
  if (document.getElementById('gameOverMsg')) return;
  const grid = document.getElementById('wordGrid');
  const msg = document.createElement('div');
  msg.id = 'gameOverMsg';
  msg.className = 'game-over-msg';
  msg.innerHTML = '🍂 机会用完啦～<br>已开花 ' + correctCount + ' 个愿望，还有 ' + (TOTAL_WISHES - correctCount) + ' 个藏在花田里';
  grid.parentNode.insertBefore(msg, grid);
  setTimeout(() => showCelebration(), 1000);
}

function showCelebration() {
  if (document.getElementById('celebration').classList.contains('active')) return;
  document.getElementById('wordGrid').style.display = 'none';
  document.getElementById('celebration').classList.add('active');
  const gom = document.getElementById('gameOverMsg');
  if (gom) gom.style.display = 'none';
  const resultsEl = document.getElementById('wishResults');
  resultsEl.innerHTML = '';
  WISH_WORDS.forEach((item, index) => {
    const wish = state.wishes[item.word] || '';
    const card = document.createElement('div');
    card.className = 'wish-result-card';
    card.style.animationDelay = (index * 0.08) + 's';
    card.innerHTML =
      '<div class="result-word">' + item.flower + ' ' + item.word + '</div>' +
      '<div class="result-wish ' + (wish ? '' : 'empty') + '">' +
      (wish || '（还没有留下祝福～）') + '</div>';
    resultsEl.appendChild(card);
  });
  const wrongWords = [];
  state.layout.forEach((item, index) => {
    if (state.clicked[index] === 'wrong') wrongWords.push(item.word);
  });
  if (wrongWords.length > 0) {
    const wrongSection = document.createElement('div');
    wrongSection.className = 'wrong-summary';
    wrongSection.style.cssText = 'grid-column: 1 / -1;';
    wrongSection.innerHTML =
      '<div class="result-word">🍂 没开花的词语</div>' +
      '<div class="wrong-tags">' +
      wrongWords.map(w => '<span class="wrong-tag">' + w + '</span>').join('') +
      '</div>';
    resultsEl.appendChild(wrongSection);
  }
}

function exportResults() {
  let text = '🌼 愿望花田 - 祝福汇总 🌼\n';
  text += '═'.repeat(28) + '\n\n';
  text += '【开花的愿望与祝福】\n\n';
  WISH_WORDS.forEach((item) => {
    const wish = state.wishes[item.word];
    if (wish !== undefined) {
      text += item.flower + ' ' + item.word + '\n';
      text += '   「' + (wish || '（无）') + '」\n\n';
    }
  });
  const wrongWords = [];
  state.layout.forEach((item, index) => {
    if (state.clicked[index] === 'wrong') wrongWords.push(item.word);
  });
  if (wrongWords.length > 0) {
    text += '【没开花的词语】\n';
    text += wrongWords.map(w => '  🍂 ' + w).join('\n') + '\n\n';
  }
  const correctCount = Object.values(state.clicked).filter(v => v === 'correct').length;
  text += '═'.replace('═', '═'.repeat(28)) + '\n';
  text += '共开花 ' + correctCount + '/' + TOTAL_WISHES + ' 个愿望\n';
  navigator.clipboard.writeText(text).then(() => {
    const btn = document.querySelector('.export-btn');
    btn.textContent = '✅ 已复制到剪贴板！';
    setTimeout(() => btn.textContent = '📋 复制祝福汇总', 2000);
  }).catch(() => {
    const ta = document.createElement('textarea');
    ta.value = text; document.body.appendChild(ta); ta.select();
    document.execCommand('copy'); document.body.removeChild(ta);
    const btn = document.querySelector('.export-btn');
    btn.textContent = '✅ 已复制到剪贴板！';
    setTimeout(() => btn.textContent = '📋 复制祝福汇总', 2000);
  });
}

function resetGame() {
  if (confirm('确定要重新开始吗？所有进度和祝福将清空。')) {
    localStorage.removeItem('wishGarden');
    location.reload();
  }
}

document.addEventListener('keydown', (e) => {
  if (e.ctrlKey && e.shiftKey && (e.key === 'R' || e.key === 'r')) {
    e.preventDefault();
    resetGame();
  }
});

init();
</script>
